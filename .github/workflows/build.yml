name: Build Android APK

on:
  push:
    branches: [ main, master ]


jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      signed: ${{ steps.sign.outputs.signed }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set version tag
        id: version
        run: echo "tag=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Update versionName in build.gradle
        run: |
          sed -i "s/versionName \".*\"/versionName \"${{ steps.version.outputs.tag }}\"/" app/build.gradle

      - name: Set up Android SDK / NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          echo "y" | sdkmanager "ndk;26.3.11579264" "cmake;3.22.1"

      - name: Copy orb6 to drawable for splash and monochrome icon
        run: cp app/src/main/assets/orb6.png app/src/main/res/drawable/orb6.png

      - name: Create monochrome icon
        run: |
          cat > app/src/main/res/drawable/ic_launcher_monochrome.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <bitmap xmlns:android="http://schemas.android.com/apk/res/android"
              android:src="@drawable/orb6" />
          XMLEOF

      - name: Move launcher icons to mipmap
        run: |
          mkdir -p app/src/main/res/mipmap-hdpi
          cp app/src/main/res/drawable/ic_launcher.png       app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp app/src/main/res/drawable/ic_launcher_round.png app/src/main/res/mipmap-hdpi/ic_launcher_round.png

      - name: Generate gradlew if missing
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.4
          fi
          chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          NDK_VERSION: "26.3.11579264"

      - name: Sign APK
        id: sign
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "Found APK: $APK"
          BUILD_TOOLS=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -1)
          SIGNED=true

          # Try release keystore if secret is set
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > orbit-release.keystore
            if keytool -list -keystore orbit-release.keystore \
                -storepass "${{ secrets.KEYSTORE_PASS }}" \
                -alias orbit 2>/dev/null; then
              echo "Using release keystore"
              $BUILD_TOOLS/apksigner sign \
                --ks orbit-release.keystore \
                --ks-pass pass:${{ secrets.KEYSTORE_PASS }} \
                --ks-key-alias orbit \
                --key-pass pass:${{ secrets.KEY_PASS }} \
                --out orbit-screensaver.apk \
                "$APK"
            else
              echo "Release keystore invalid, falling back to debug"
              SIGNED=false
            fi
          else
            echo "No keystore secret, using debug"
            SIGNED=false
          fi

          if [ "$SIGNED" = "false" ]; then
            # Generate a fresh debug keystore
            keytool -genkeypair -v \
              -keystore debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 \
              -validity 9999 \
              -storepass android \
              -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
            $BUILD_TOOLS/apksigner sign \
              --ks debug.keystore \
              --ks-pass pass:android \
              --ks-key-alias androiddebugkey \
              --key-pass pass:android \
              --out orbit-screensaver.apk \
              "$APK"
          fi

          echo "signed=$SIGNED" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbit-screensaver-apk
          path: orbit-screensaver.apk
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: orbit-screensaver-apk
          path: artifacts/

      - name: Set release title
        id: title
        run: |
          if [ "${{ needs.build.outputs.signed }}" = "true" ]; then
            echo "name=AUTOBUILD ${{ needs.build.outputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=AUTOBUILD ${{ needs.build.outputs.tag }} (Debug)" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: ${{ steps.title.outputs.name }}
          body: autofuckingbuilt (android edition)
          files: artifacts/orbit-screensaver.apk
