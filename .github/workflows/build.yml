name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set version tag
        id: version
        run: echo "tag=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Update versionName in build.gradle
        run: |
          sed -i "s/versionName \".*\"/versionName \"${{ steps.version.outputs.tag }}\"/" app/build.gradle

      - name: Set up Android SDK / NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          echo "y" | sdkmanager "ndk;26.3.11579264" "cmake;3.22.1"

      - name: Generate gradlew if missing
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.4
          fi
          chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          NDK_VERSION: "26.3.11579264"

      # Sign with a debug key for now
      - name: Sign APK (debug key)
        run: |
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -1)/apksigner sign \
            --ks ~/.android/debug.keystore \
            --ks-pass pass:android \
            --out orbit-screensaver.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbit-screensaver-apk
          path: orbit-screensaver.apk
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: orbit-screensaver-apk
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: AUTOBUILD ${{ needs.build.outputs.tag }}
          body: autofuckingbuilt (android edition)
          files: artifacts/orbit-screensaver.apk
